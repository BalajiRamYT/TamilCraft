<!DOCTYPE html>

<head>

    <title>TamilCraft</title>
    <link rel="icon" type="image/png" href="assets/logos/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=VT323&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body class="antialiased selection:bg-amber-500 selection:text-white">
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>
    <div id="particles"></div>
    <div
        class="fixed inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10 pointer-events-none z-[-1]">
    </div>
    <nav class="fixed top-0 w-full z-50 glass-panel px-6 py-3 flex justify-between items-center h-20" id="navbar">
        <div class="flex items-center interactable cursor-pointer" onclick="window.location.href='index.html'">
            <img src="assets/logos/header_logo.png" alt="TC Logo" class="h-10 md:h-12 w-auto drop-shadow-md">
        </div>
        <div class="nav-pill">
            <a href="index.html"
                class="pixel-font text-lg text-amber-100 hover:text-amber-400 transition-colors interactable"
                data-t="nav.home">HOME</a>

                class="pixel-font text-lg text-amber-100 hover:text-amber-400 transition-colors interactable"

            <a href="smp.html"

                data-t="nav.smp">SMP</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="store.html" class="hidden md:flex store-btn pixel-font text-lg interactable">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                <span data-t="nav.store">STORE</span>
            </a>
            <div class="hidden md:flex items-center gap-4 ml-2 border-l border-white/10 pl-4">

                </button>
                <button id="theme-btn"
                    class="interactable p-2 rounded-full bg-amber-900/20 hover:bg-amber-500/20 transition-colors"
                    aria-label="Toggle Theme">
                    <i data-lucide="sun" class="w-4 h-4 text-amber-400 hidden light-icon"></i>
                    <i data-lucide="moon" class="w-4 h-4 text-amber-200 dark-icon"></i>
                </button>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-amber-400 interactable">
                <i data-lucide="menu"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#0c0703]/fb backdrop-blur-2xl flex flex-col items-center justify-center translate-x-full transition-transform duration-500 ease-in-out md:hidden">
        <button id="close-menu-btn" class="absolute top-6 right-6 text-amber-500 interactable p-2 hover:bg-amber-500/10 rounded-full transition-colors">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        
        <div class="flex flex-col items-center gap-10">
            <a href="index.html" class="pixel-font text-4xl text-amber-100 hover:text-amber-400 transition-all hover:scale-110 interactable" data-t="nav.home">HOME</a>
            <a href="members.html" class="pixel-font text-4xl text-amber-100 hover:text-amber-400 transition-all hover:scale-110 interactable" data-t="nav.members">MEMBERS</a>
            <a href="videos.html" class="pixel-font text-4xl text-amber-100 hover:text-amber-400 transition-all hover:scale-110 interactable" data-t="nav.videos">VIDEOS</a>
            <a href="smp.html" class="pixel-font text-4xl text-amber-100 hover:text-amber-400 transition-all hover:scale-110 interactable" data-t="nav.smp">SMP</a>
            <a href="store.html" class="pixel-font text-4xl text-amber-100 hover:text-amber-400 transition-all hover:scale-110 interactable" data-t="nav.store">STORE</a>
        </div>
        
        <div class="absolute bottom-12 flex gap-8">
            <a href="https://discord.gg/nh7hpvWrVR" target="_blank" class="text-amber-500/60 hover:text-amber-400 transition-colors"><i data-lucide="message-square" class="w-6 h-6"></i></a>
            <a href="https://www.youtube.com/@TamilcraftYT" target="_blank" class="text-amber-500/60 hover:text-amber-400 transition-colors"><i data-lucide="youtube" class="w-6 h-6"></i></a>
        </div>
    </div>
    <main class="relative z-10 pt-32 pb-20">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-16 text-center">
                <h1 class="text-6xl md:text-8xl mb-4 pixel-font" style="color: var(--accent-gold)" data-t="videos.title">LATEST DROPS</h1>
                <p class="text-xl" style="color: var(--text-muted)" data-t="videos.sub">Catch the latest adventures from the crew.</p>
            </div>
            <div id="videos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
        </div>
    </main>
    <footer class="py-12 border-t border-amber-900/20 backdrop-blur-md bg-black/40">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="pixel-font text-3xl mb-6 text-amber-500">TAMILCRAFT</h2>
            <div class="flex justify-center space-x-8 mb-8">
                <a href="https://www.youtube.com/@TamilcraftYT"
                    class="text-white/40 hover:text-red-500 transition-colors interactable transform hover:scale-110"><i
                        data-lucide="youtube"></i></a>
                <a href="https://discord.gg/nh7hpvWrVR"

                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 127.14 96.36"
